# ═══════════════════════════════════════════
# SAMA Logistics — Docker Compose
# ═══════════════════════════════════════════

services:
  sama-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sama-logistics
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/db/dev.db
      - JWT_SECRET=${JWT_SECRET:-sama-logistics-production-secret-change-me}
      - NEXT_PUBLIC_BASE_URL=http://localhost:3030
    volumes:
      # Persistent data volumes (initialized by entrypoint on first run)
      - sama-db:/data/db
      - sama-images:/data/images
      - sama-uploads:/data/uploads
    networks:
      - sama-network

volumes:
  sama-db:
  sama-images:
  sama-uploads:

networks:
  sama-network:
    driver: bridge
